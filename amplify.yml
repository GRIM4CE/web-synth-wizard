version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*.js'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'
    - pattern: '**/*.css'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'
    - pattern: index.html
      headers:
        - key: Cache-Control
          value: 'public, max-age=60, stale-while-revalidate=86400'
